name: FHIR IG Docker Build

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ig-docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Run _build.sh in publisher container
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull IG Publisher Docker image
        run: docker pull hl7fhir/ig-publisher-base:latest

      - name: Download FHIR IG Publisher
        run: |
          mkdir -p "${{ github.workspace }}/input-cache"
          curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar \
            -o "${{ github.workspace }}/input-cache/publisher.jar"

      - name: Run _build.sh inside publisher container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/home/publisher/ig" \
            -w /home/publisher/ig \
            hl7fhir/ig-publisher-base:latest \
            /bin/bash -lc "bash ./_build.sh build"

      - name: Verify QA output exists
        run: |
          test -f output/qa.json
          test -f output/qa-time-report.json
          test -f output/qa-time-report.tsv
