# ╭─────────────────────────Commonly Used ImplementationGuide Properties───────────────────────────╮
# │  The properties below are used to create the ImplementationGuide resource. The most commonly   │
# │  used properties are included. For a list of all supported properties and their functions,     │
# │  see: https://fshschool.org/docs/sushi/configuration/.                                         │
# ╰────────────────────────────────────────────────────────────────────────────────────────────────╯
id: ihe.rad.mado
canonical: https://profiles.ihe.net/RAD/MADO
version: 0.0.1-current
name: IHE_RAD_MADO
title: "Manifest-based Access to DICOM Objects (MADO)"
description: ImplementationGuide for IHE Radiology Technical Framework Supplement Manifest-based Access to DICOM Objects (MADO)
releaseLabel: ci-build
#releaseLabel: ballot
#releaseLabel: trial-use
#releaseLabel: release
#date: 2026-03-16
status: draft # draft | active | retired | unknown
publisher:
  ## Find your domain contact on the https://www.ihe.net/ihe_domains page
  - name: IHE Radiology Technical Committee
  - url: https://www.ihe.net/ihe_domains/radiology/
  - email: rad@ihe.net
contact:
  - name: IHE Radiology Technical Committee
    telecom:
      - system: email
        value: rad@ihe.net
license:  CC-BY-4.0
fhirVersion: 4.0.1 # https://www.hl7.org/fhir/valueset-FHIR-version.html
jurisdiction: 'http://unstats.un.org/unsd/methods/m49/m49.htm#001'
#copyright: IHE http://www.ihe.net/Governance/#Intellectual_Property
copyrightYear: 2025+
# The dependencies property corresponds to IG.dependsOn. The key is the
# package id and the value is the version (or dev/current). For advanced
# use cases, the value can be an object with keys for id, uri, and version.
#
dependencies:
  ihe.iti.mhd: current
  hl7.fhir.uv.xver-r5.r4: 0.0.1-snapshot-2 
  fhir.dicom: 
    id: DICOM
    uri: http://fhir.org/packages/fhir.dicom/ImplementationGuide/fhir.dicom
    version: 2025.3.20250714
  ihe.formatcode.fhir: current

parameters:  # see http://build.fhir.org/ig/FHIR/fhir-tools-ig/branches/master/index.html
  path-resource:
    - input/resources
    - fsh-generated/resources
    - input/examples
#  path-pages:
#    - input/pagecontent
#    - fsh-generated/includes
  show-inherited-invariants: 'false'
  usage-stats-opt-out: 'false'
  logging: progress
  shownav: 'true'
  active-tables: 'false'
  apply-contact: 'true'
  apply-jurisdiction: 'true'
  apply-publisher: 'true'
  apply-version: 'true'
  autoload-resources: 'true'

# valueSets and codeSystems should be given OIDs, this is especially required if that codeSystem or valueSet is going to be used by CDA. IHE has an OID root that is managed https://wiki.ihe.net/index.php/OID_Registration, with a branch assigned to each IHE domain. Each IHE domain should have a page where they manage assignments within their branch. an OID should be assigned to each IG, and that OID placed below so that the IG publisher will manage OID assignment to all valueSets and codeSystems defined in that IG. The IG publisher will create an ./oids.ini in the project root that will need to be checked into your github repository.
#  auto-oid-root: 1.3.6.1.4.1.19376.1.5....

#resources:
# list every example here with a name, description and that exampleBoolean is true; These are used to populate the artifacts page, and are needed to eliminate build warnings 
# You may delay filling out this section until you approach publication as it is merely a nice to have and eliminates build warnings -- If you do this then you will need above the autoload-resources true

 
# The pages property corresponds to IG.definition.page. SUSHI can
# auto-generate the page list, but if the author includes pages in
# this file, it is assumed that the author will fully manage the
# pages section and SUSHI will not generate any page entries.
# The page file name is used as the key. If title is not provided,
# then the title will be generated from the file name.  If a
# generation value is not provided, it will be inferred from the
# file name extension.  Any subproperties that are valid filenames
# with supported extensions (e.g., .md/.xml) will be treated as
# sub-pages.
#
pages:
  # itemize here each narrative page. Include assigned section numbers when appropriate. The order they appear here is the order they will appear in the TOC and on the next/prev navigation.
  index.md:
    title: Imaging Manifest for DICOM Objects (MADO) Implementation Guide
  volume-1.md:
    title: Volume 1
    generation: markdown
  volume-2.md:
    title: Volume 2
    generation: markdown
  volume-3.md:
    title: Volume 3
    generation: markdown
    fhir-imaging-manifest.md:
      title: FHIR Imaging Manifest
      generation: markdown
    manifest-envelope.md:
      title: Manifest Envelopes for IHE-MHD
      generation: markdown
    mapping.md:
      title: Mappings between MADO FHIR and MADO DICOM KOS
      generation: markdown
  download.md: 
    title: Download
    generation: markdown
  testplan.md:
    title: Test plan
    generation: markdown
  issues.md:
    title: Significant Changes and Issues
    generation: markdown
# ╭────────────────────────────────────────────menu.xml────────────────────────────────────────────╮
